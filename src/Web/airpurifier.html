<!DOCTYPE html>
<html>
<head>
    <title>Air purifier Data</title>
    <link rel="stylesheet" href="airpurifier.css">
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
</head>

<body>
<header>
    <nav>
        <h1>Project - Air Quality System</h1>
        <ul>
            <li><a href="index.html">Login</a></li>
            <li><a href="airpurifier.html" class="active">Air Data</a></li>
            <li><a href="background_info.html">Home/Background</a></li>
        </ul>
    </nav>
</header>

<h1>Air purifier Data</h1>

<div class="dataBox">
    <p>gas: <span id="gas"> Ω</span></p>
    <p>Temperature: <span id="temperature"> °C</span></p>
    <p>Humidity: <span id="humidity"> %</span></p>
    <p>Pressure: <span id="pressure"> hPa</span></p>
</div>

<button onclick="getData()">Refresh Data</button>
<script src="airpurifier.js">

    const socket = io();

    socket.on('connect', (socket) => {
        socket.emit('connected!');
    })

    socket.on('sensor update', (data) => {
        console.log(data);
        document.getElementById("temperature").innerHTML = data.temp;
        document.getElementById("pressure").innerHTML = data.pressure;
        document.getElementById("gas").innerHTML = data.gas;
        document.getElementById("humidity").innerHTML = data.humidity;
    })

</script>

<footer>
<p>© 2026 Air Quality Sensor Project</p>
</footer>

</body>
</html>
